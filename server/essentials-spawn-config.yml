# EssentialsXSpawn configuration
# Docs: https://essentialsx.net/wiki/modules#essentialsx-spawn
# Baked into the image and seeded to /data/plugins/EssentialsXSpawn/config.yml on first boot.

newbies:
  spawnpoint: default
  kit: ''
  message: ''

# Teleport ALL players to spawn on every join, not just new players.
spawn-on-join: true
